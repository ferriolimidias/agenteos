services:
  db:
    image: ankane/pgvector:latest
    pull_policy: always
    container_name: agent_os_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agent_os}
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agent_os}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:alpine
    pull_policy: always
    container_name: agent_os_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build: .
    container_name: agent_os_backend
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent_os}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_TOKEN: ${EVOLUTION_API_TOKEN}
      TZ: America/Sao_Paulo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      pull: true
    container_name: agent_os_frontend
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - backend
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "127.0.0.1:8080:80"

volumes:
  postgres_data:
  redis_data:
